services:
  - type: web
    name: nexusai-backend
    runtime: node
    rootDir: backend
    buildCommand: cd .. && npm install && npm run build && cd backend && npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: LOCAL_AI_URL
        sync: false
